<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#13110d">
<title>训练</title>
<style>
  :root{
    --paper:#f3f2ed;       /* 背景 */
    --card:#ffffff;        /* 卡片 */
    --ink:#16140f;         /* 主文字 */
    --ink-2:#6b675d;       /* 次文字 */
    --line:#e3e1d8;        /* 分割线 */
    --accent:#e8553b;      /* 强调色 */
    --done:#1fae8c;        /* 完成 */
    --shadow:0 1px 2px rgba(20,18,14,.05),0 8px 24px rgba(20,18,14,.06);
    --nav-h:64px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro","Segoe UI",system-ui,"PingFang SC","Microsoft Yahei",sans-serif;
    background:var(--paper);color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:contain;
  }
  #app{max-width:520px;margin:0 auto;min-height:100%;position:relative;
       padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));}
  .screen{display:none;padding:0 18px;animation:fade .25s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ---------- 顶部 ---------- */
  .top{padding:calc(env(safe-area-inset-top) + 14px) 0 8px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .top h1{font-size:13px;font-weight:600;letter-spacing:.14em;color:var(--ink-2);margin:0 0 4px;text-transform:uppercase}
  .top .date{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.05}
  .top .sub{font-size:13px;color:var(--ink-2);margin-top:3px}

  /* ---------- 视图切换滑块 ---------- */
  .toggle{display:inline-flex;background:#e7e5dc;border-radius:999px;padding:3px;position:relative;flex:none}
  .toggle button{position:relative;z-index:2;border:0;background:transparent;font:inherit;font-size:13px;font-weight:600;
    color:var(--ink-2);padding:7px 14px;border-radius:999px;cursor:pointer;transition:color .2s}
  .toggle button.on{color:#fff}
  .toggle .pill{position:absolute;z-index:1;top:3px;bottom:3px;left:3px;width:calc(50% - 3px);
    background:var(--ink);border-radius:999px;transition:transform .26s cubic-bezier(.4,1.2,.5,1)}
  .toggle.cal .pill{transform:translateX(100%)}

  /* ---------- 任务卡片 ---------- */
  .tasks{margin-top:6px;display:flex;flex-direction:column;gap:12px;padding-bottom:24px}
  .task{background:var(--card);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;display:flex;
        transition:transform .12s ease,opacity .2s}
  .task:active{transform:scale(.985)}
  .task.done{opacity:.5}
  .task .thumb{width:116px;flex:none;background:#11100c;position:relative;background-size:cover;background-position:center}
  .task .thumb .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;opacity:.85}
  .task .badge{position:absolute;left:7px;bottom:7px;font-size:10px;font-weight:700;letter-spacing:.04em;
    background:rgba(0,0,0,.62);color:#fff;padding:3px 7px;border-radius:6px;backdrop-filter:blur(2px)}
  .task .body{flex:1;min-width:0;padding:13px 14px;display:flex;flex-direction:column;gap:7px}
  .task .title{font-size:15px;font-weight:650;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .task .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:auto}
  .chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;color:#fff;white-space:nowrap}
  .min{font-size:12px;color:var(--ink-2);font-weight:600}
  .task .check{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);flex:none;align-self:center;
    margin:0 14px 0 0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:all .15s}
  .task.done .check{background:var(--done);border-color:var(--done)}

  /* ---------- 日历 ---------- */
  .calwrap{margin-top:14px;background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:16px 14px 18px}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .calhead .m{font-size:17px;font-weight:750}
  .calhead button{border:0;background:#f0efe8;width:32px;height:32px;border-radius:10px;font-size:16px;cursor:pointer;color:var(--ink)}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
  .dow span{text-align:center;font-size:11px;font-weight:700;color:var(--ink-2)}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cell{aspect-ratio:1/1.12;border-radius:11px;padding:4px 3px 0;display:flex;flex-direction:column;align-items:center;
        font-size:12px;cursor:pointer;position:relative;border:1.5px solid transparent}
  .cell.out{opacity:.28}
  .cell.today{border-color:var(--ink)}
  .cell.sel{background:var(--ink);color:#fff}
  .cell .dnum{font-weight:650;line-height:1.5}
  .cell .dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:1px}
  .cell .dot{width:5px;height:5px;border-radius:50%}
  .cell.rest .dnum{color:var(--ink-2)}
  .daydetail{margin-top:16px}
  .daydetail h3{font-size:13px;font-weight:700;color:var(--ink-2);letter-spacing:.04em;margin:0 0 10px}

  /* ---------- 通用 ---------- */
  .empty{text-align:center;padding:54px 24px;color:var(--ink-2)}
  .empty .ico{font-size:42px;margin-bottom:12px}
  .empty p{font-size:14px;line-height:1.6;margin:0 0 18px}
  .btn{border:0;border-radius:14px;font:inherit;font-weight:700;font-size:15px;padding:14px 18px;cursor:pointer;
       background:var(--ink);color:#fff;width:100%;transition:transform .1s}
  .btn:active{transform:scale(.98)}
  .btn.ghost{background:#e7e5dc;color:var(--ink)}
  .btn.accent{background:var(--accent)}
  .btn-row{display:flex;gap:10px}
  .link-btn{background:none;border:0;color:var(--accent);font:inherit;font-weight:700;font-size:14px;cursor:pointer;padding:0}

  /* ---------- 动作库 ---------- */
  .cat-block{margin-bottom:20px}
  .cat-title{display:flex;align-items:center;gap:9px;margin-bottom:10px}
  .cat-title .swatch{width:13px;height:13px;border-radius:4px;flex:none}
  .cat-title .n{font-size:17px;font-weight:750}
  .cat-title .count{font-size:12px;color:var(--ink-2);font-weight:600}
  .cat-title .add{margin-left:auto;border:0;background:#e7e5dc;width:30px;height:30px;border-radius:9px;font-size:18px;cursor:pointer;color:var(--ink);line-height:1}
  .ex-row{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:11px 13px;display:flex;align-items:center;gap:11px;margin-bottom:8px}
  .ex-row .ei{font-size:20px;width:24px;text-align:center;flex:none}
  .ex-row .et{flex:1;min-width:0}
  .ex-row .et .t{font-size:14px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ex-row .et .s{font-size:12px;color:var(--ink-2);margin-top:2px;display:flex;gap:7px;align-items:center}
  .ex-row .del{border:0;background:none;color:var(--ink-2);font-size:18px;cursor:pointer;padding:4px;flex:none}
  .tag-type{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px}
  .tag-type.cardio{background:#dff4f6;color:#0f8fa3}
  .tag-type.strength{background:#fbe6e0;color:#c4452c}

  /* ---------- 计划设置 ---------- */
  .field{margin-bottom:22px}
  .field>label{display:block;font-size:14px;font-weight:700;margin-bottom:4px}
  .field .hint{font-size:12px;color:var(--ink-2);margin-bottom:11px;line-height:1.5}
  .stepper{display:flex;align-items:center;gap:0;background:var(--card);border-radius:14px;box-shadow:var(--shadow);width:fit-content;overflow:hidden}
  .stepper button{border:0;background:transparent;width:46px;height:46px;font-size:22px;cursor:pointer;color:var(--ink)}
  .stepper .val{min-width:64px;text-align:center;font-size:18px;font-weight:750}
  .range2{display:flex;align-items:center;gap:12px}
  .range2 .stepper{flex:1}
  .range2 .stepper .val{flex:1}
  .seg{display:flex;background:#e7e5dc;border-radius:13px;padding:3px;gap:3px}
  .seg button{flex:1;border:0;background:transparent;font:inherit;font-weight:650;font-size:13px;padding:10px 4px;border-radius:10px;cursor:pointer;color:var(--ink-2)}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
  .ratio{display:flex;align-items:center;gap:14px}
  .ratio input[type=range]{flex:1;accent-color:var(--accent)}
  .ratio .lab{font-size:13px;font-weight:700;white-space:nowrap}
  .daypick{display:flex;gap:6px;justify-content:space-between}
  .daypick button{flex:1;aspect-ratio:1;border:1.5px solid var(--line);background:var(--card);border-radius:11px;
    font-weight:700;font-size:14px;cursor:pointer;color:var(--ink)}
  .daypick button.rest{background:var(--ink);color:#fff;border-color:var(--ink);opacity:.35}
  textarea{width:100%;border:1.5px solid var(--line);border-radius:14px;padding:12px;font:inherit;font-size:14px;
    resize:vertical;min-height:78px;background:var(--card);color:var(--ink)}
  textarea:focus{outline:none;border-color:var(--ink)}
  .plan-summary{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-bottom:18px}
  .plan-summary .row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
  .plan-summary .row:last-child{border-bottom:0}
  .plan-summary .row .dn{font-weight:700}
  .plan-summary .row .dt{color:var(--ink-2);font-size:12px;display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}

  /* ---------- 底部导航 ---------- */
  nav{position:fixed;left:0;right:0;bottom:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding-bottom:env(safe-area-inset-bottom);background:rgba(243,242,237,.86);backdrop-filter:blur(14px);
      border-top:1px solid var(--line);display:flex;z-index:50;max-width:520px;margin:0 auto}
  nav button{flex:1;border:0;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;font:inherit;font-size:10.5px;font-weight:650;color:var(--ink-2);cursor:pointer}
  nav button .ni{font-size:21px;line-height:1}
  nav button.on{color:var(--ink)}

  /* ---------- 弹窗 ---------- */
  .sheet-bg{position:fixed;inset:0;background:rgba(20,18,14,.42);z-index:100;display:none;align-items:flex-end;justify-content:center}
  .sheet-bg.show{display:flex}
  .sheet{background:var(--paper);width:100%;max-width:520px;border-radius:24px 24px 0 0;padding:22px 18px calc(28px + env(safe-area-inset-bottom));
    max-height:90vh;overflow:auto;animation:up .28s cubic-bezier(.3,1,.5,1)}
  @keyframes up{from{transform:translateY(100%)}to{transform:none}}
  .sheet h2{font-size:19px;font-weight:800;margin:0 0 18px}
  .sheet .grab{width:38px;height:4px;background:var(--line);border-radius:99px;margin:0 auto 16px}
  .inp{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:13px;font:inherit;font-size:15px;background:var(--card);color:var(--ink);margin-bottom:13px}
  .inp:focus{outline:none;border-color:var(--ink)}
  .lbl{font-size:13px;font-weight:700;margin:2px 0 7px;display:block}
  .swatches{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px}
  .swatches button{width:34px;height:34px;border-radius:10px;border:3px solid transparent;cursor:pointer}
  .swatches button.on{border-color:var(--ink)}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
</style>
</head>
<body>
<div id="app">

  <!-- ========== 今天 ========== -->
  <section id="s-today" class="screen active">
    <div class="top">
      <div>
        <h1>今天的训练</h1>
        <div class="date" id="todayDate">—</div>
        <div class="sub" id="todaySub">—</div>
      </div>
      <div class="toggle" id="viewToggle">
        <div class="pill"></div>
        <button class="on" data-v="list">列表</button>
        <button data-v="cal">日历</button>
      </div>
    </div>
    <div id="listView"><div class="tasks" id="todayTasks"></div></div>
    <div id="calView" style="display:none">
      <div class="calwrap">
        <div class="calhead">
          <button id="prevM">‹</button>
          <div class="m" id="calMonth">—</div>
          <button id="nextM">›</button>
        </div>
        <div class="dow"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
        <div class="grid" id="calGrid"></div>
        <div class="daydetail">
          <h3 id="dayLabel">选中日期</h3>
          <div class="tasks" id="dayTasks"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ========== 计划 ========== -->
  <section id="s-plan" class="screen">
    <div class="top"><div><h1>训练计划</h1><div class="date" style="font-size:26px">安排我的一周</div></div></div>
    <div style="padding-bottom:30px">
      <div class="field">
        <label>每周训练几天</label>
        <div class="hint">其余日子自动作为休息日。</div>
        <div class="stepper"><button data-step="days-">−</button><span class="val" id="vDays">4</span><button data-step="days+">+</button></div>
      </div>
      <div class="field">
        <label>每天时长范围（分钟）</label>
        <div class="hint">系统会把每天的训练量控制在这个区间内。</div>
        <div class="range2">
          <div class="stepper"><button data-step="min-">−</button><span class="val" id="vMin">30</span><button data-step="min+">+</button></div>
          <span style="color:var(--ink-2);font-weight:700">至</span>
          <div class="stepper"><button data-step="max-">−</button><span class="val" id="vMax">60</span><button data-step="max+">+</button></div>
        </div>
      </div>
      <div class="field">
        <label>有氧 : 无氧 比例</label>
        <div class="hint">向左偏重力量，向右偏重有氧。</div>
        <div class="ratio">
          <span class="lab">力量 <span id="vStr">50</span>%</span>
          <input type="range" id="ratio" min="0" max="100" step="10" value="50" aria-label="有氧无氧比例">
          <span class="lab"><span id="vCar">50</span>% 有氧</span>
        </div>
      </div>
      <div class="field">
        <label>休息日</label>
        <div class="hint">点选要固定休息的星期。</div>
        <div class="daypick" id="dayPick"></div>
      </div>
      <div class="field">
        <label>其他偏好（选填）</label>
        <div class="hint">比如「周末多练腿」「跑步固定排早上」。先记下来，之后可接入 AI 自动解析。</div>
        <textarea id="notes" placeholder="写下任何你想让计划照顾到的偏好…"></textarea>
      </div>
      <button class="btn accent" id="genPlan">生成本周计划</button>
      <div id="planResult" style="margin-top:22px"></div>
    </div>
  </section>

  <!-- ========== 动作库 ========== -->
  <section id="s-lib" class="screen">
    <div class="top">
      <div><h1>动作库</h1><div class="date" style="font-size:26px">我的训练内容</div></div>
      <button class="link-btn" id="addCatBtn">+ 部位</button>
    </div>
    <div id="libBody" style="padding-bottom:30px"></div>
  </section>

  <!-- ========== 底部导航 ========== -->
  <nav>
    <button class="on" data-go="today"><span class="ni">◫</span>今天</button>
    <button data-go="plan"><span class="ni">◷</span>计划</button>
    <button data-go="lib"><span class="ni">▤</span>动作库</button>
  </nav>
</div>

<!-- ========== 弹窗：添加部位 ========== -->
<div class="sheet-bg" id="catSheet">
  <div class="sheet">
    <div class="grab"></div>
    <h2>新增训练部位</h2>
    <label class="lbl">名称</label>
    <input class="inp" id="catName" placeholder="例如 臀腿、肩背、有氧">
    <label class="lbl">颜色</label>
    <div class="swatches" id="catSwatches"></div>
    <label class="lbl">类型</label>
    <div class="seg" id="catType" style="margin-bottom:20px">
      <button class="on" data-ct="strength">力量</button>
      <button data-ct="cardio">有氧</button>
    </div>
    <div class="btn-row">
      <button class="btn ghost" data-close>取消</button>
      <button class="btn" id="saveCat">添加</button>
    </div>
  </div>
</div>

<!-- ========== 弹窗：添加动作 ========== -->
<div class="sheet-bg" id="exSheet">
  <div class="sheet">
    <div class="grab"></div>
    <h2 id="exSheetTitle">添加动作</h2>
    <div class="seg" id="exKind" style="margin-bottom:18px">
      <button class="on" data-ek="video">视频链接</button>
      <button data-ek="card">运动卡片</button>
    </div>
    <div id="videoFields">
      <label class="lbl">视频链接</label>
      <input class="inp" id="exUrl" placeholder="粘贴 YouTube / B站 / 小红书 链接">
      <label class="lbl">标题（选填，会自动尽量识别）</label>
      <input class="inp" id="exTitle" placeholder="例如 臀桥 10 分钟跟练">
    </div>
    <div id="cardFields" style="display:none">
      <label class="lbl">名称</label>
      <input class="inp" id="exCardName" placeholder="例如 游泳、跑步、跳绳">
    </div>
    <div class="range2" style="margin-bottom:18px">
      <div>
        <label class="lbl">时长（分钟）</label>
        <div class="stepper"><button data-exmin="-">−</button><span class="val" id="exMinVal">20</span><button data-exmin="+">+</button></div>
      </div>
      <div style="flex:1">
        <label class="lbl">类型</label>
        <div class="seg" id="exType">
          <button class="on" data-et="strength">力量</button>
          <button data-et="cardio">有氧</button>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn ghost" data-close>取消</button>
      <button class="btn" id="saveEx">保存</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ---------------- 存储 ---------------- */
const KEY="trainingApp.v1";
const PALETTE=["#e8553b","#2f6bff","#f2a03d","#8a5be0","#1fae8c","#e0457b","#16b3c9","#6b7280"];
let mem=null;
function load(){
  try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}
  return mem;
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){mem=state;}
}
let state=load()||{
  categories:[],exercises:[],
  prefs:{daysPerWeek:4,dailyMin:30,dailyMax:60,cardioPct:50,restDays:[],notes:""},
  plan:null, done:{}
};

/* ---------------- 工具 ---------------- */
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const uid=()=>Math.random().toString(36).slice(2,9);
const WD=["周一","周二","周三","周四","周五","周六","周日"];
const WD1=["一","二","三","四","五","六","日"];
function todayIdx(){return (new Date().getDay()+6)%7;} // 0=周一
function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function catById(id){return state.categories.find(c=>c.id===id);}
function exById(id){return state.exercises.find(e=>e.id===id);}

function detectPlatform(url){
  const u=(url||"").toLowerCase();
  if(u.includes("youtube.com")||u.includes("youtu.be"))return "youtube";
  if(u.includes("bilibili.com")||u.includes("b23.tv"))return "bilibili";
  if(u.includes("xiaohongshu")||u.includes("xhslink"))return "xiaohongshu";
  return "link";
}
function ytId(url){
  try{
    const u=new URL(url);
    if(u.hostname.includes("youtu.be"))return u.pathname.slice(1);
    if(u.searchParams.get("v"))return u.searchParams.get("v");
    const m=u.pathname.match(/\/(embed|shorts)\/([^/?]+)/);if(m)return m[2];
  }catch(e){}
  return null;
}
const PLAT={youtube:{n:"YouTube",i:"▶"},bilibili:{n:"哔哩哔哩",i:"📺"},xiaohongshu:{n:"小红书",i:"📕"},link:{n:"链接",i:"🔗"}};

/* ---------------- 导航 ---------------- */
function go(name){
  $$(".screen").forEach(s=>s.classList.remove("active"));
  $("#s-"+name).classList.add("active");
  $$("nav button").forEach(b=>b.classList.toggle("on",b.dataset.go===name));
  window.scrollTo(0,0);
  if(name==="today")renderToday();
  if(name==="lib")renderLib();
  if(name==="plan")renderPlanScreen();
}
$$("nav button").forEach(b=>b.onclick=()=>go(b.dataset.go));

/* ---------------- 今天 / 视图切换 ---------------- */
let calCursor=new Date(); let calSel=ymd(new Date());
function renderToday(){
  const now=new Date();
  $("#todayDate").textContent=(now.getMonth()+1)+"月"+now.getDate()+"日";
  const ids=planForWeekday(todayIdx());
  $("#todaySub").textContent=WD[todayIdx()]+" · "+(ids.length?ids.length+" 项训练":(state.plan?"休息日":"还没有计划"));
  renderTaskList($("#todayTasks"),ids,ymd(now),true);
}
function renderTaskList(box,ids,dateStr,allowEmpty){
  box.innerHTML="";
  if(!ids.length){
    if(!state.exercises.length){
      box.innerHTML=`<div class="empty"><div class="ico">🏋️</div>
        <p>先去「动作库」添加你要练的部位和动作，<br>再到「计划」生成每周安排。</p>
        <button class="btn accent" onclick="seedDemo()">载入一份示例看看</button></div>`;
    }else if(!state.plan){
      box.innerHTML=`<div class="empty"><div class="ico">🗓️</div>
        <p>动作已就绪，去「计划」生成本周安排吧。</p>
        <button class="btn accent" onclick="go('plan')">去生成计划</button></div>`;
    }else{
      box.innerHTML=`<div class="empty"><div class="ico">🌿</div><p>今天是休息日，好好恢复。</p></div>`;
    }
    return;
  }
  const done=state.done[dateStr]||[];
  ids.forEach(id=>{
    const e=exById(id);if(!e)return;
    const cat=catById(e.catId)||{color:"#888",name:""};
    const isDone=done.includes(id);
    const el=document.createElement("div");
    el.className="task"+(isDone?" done":"");
    let thumb="";
    if(e.kind==="video"){
      const yt=e.platform==="youtube"?ytId(e.url):null;
      const bg=yt?`style="background-image:url('https://img.youtube.com/vi/${yt}/hqdefault.jpg')"`:"";
      thumb=`<div class="thumb" ${bg}>${yt?"":`<div class="ph">${PLAT[e.platform].i}</div>`}<span class="badge">${PLAT[e.platform].n}</span></div>`;
    }else{
      thumb=`<div class="thumb" style="background:linear-gradient(135deg,${cat.color},${shade(cat.color)})"><div class="ph">${cardIcon(e.title)}</div></div>`;
    }
    el.innerHTML=thumb+
      `<div class="body">
         <div class="title">${esc(e.title)}</div>
         <div class="meta"><span class="chip" style="background:${cat.color}">${esc(cat.name)}</span>
           <span class="min">${e.minutes} 分钟</span>
           <span class="tag-type ${e.type}">${e.type==="cardio"?"有氧":"力量"}</span></div>
       </div>
       <button class="check" aria-label="完成">✓</button>`;
    el.querySelector(".check").onclick=ev=>{ev.stopPropagation();toggleDone(dateStr,id);};
    el.onclick=()=>{ if(e.kind==="video"&&e.url){ window.open(e.url,"_blank"); } };
    box.appendChild(el);
  });
}
function toggleDone(dateStr,id){
  const arr=state.done[dateStr]||(state.done[dateStr]=[]);
  const i=arr.indexOf(id);
  if(i>=0)arr.splice(i,1);else arr.push(id);
  save();
  if($("#s-today").classList.contains("active")){
    if($("#calView").style.display!=="none")renderCalendar();else renderToday();
  }
}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function shade(hex){return hex+"cc";}
function cardIcon(t){t=t||"";if(/游泳/.test(t))return"🏊";if(/跑|run/i.test(t))return"🏃";if(/单车|骑|cycl|bike/i.test(t))return"🚴";if(/跳绳/.test(t))return"🤸";if(/瑜伽|yoga/i.test(t))return"🧘";if(/走|walk/i.test(t))return"🚶";return"💪";}

/* 视图切换 */
const toggle=$("#viewToggle");
toggle.querySelectorAll("button").forEach(b=>b.onclick=()=>{
  const v=b.dataset.v;
  toggle.querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));
  toggle.classList.toggle("cal",v==="cal");
  $("#listView").style.display=v==="list"?"":"none";
  $("#calView").style.display=v==="cal"?"":"none";
  if(v==="cal")renderCalendar();
});
$("#prevM").onclick=()=>{calCursor.setMonth(calCursor.getMonth()-1);renderCalendar();};
$("#nextM").onclick=()=>{calCursor.setMonth(calCursor.getMonth()+1);renderCalendar();};

function renderCalendar(){
  const y=calCursor.getFullYear(),m=calCursor.getMonth();
  $("#calMonth").textContent=y+"年"+(m+1)+"月";
  const first=new Date(y,m,1);
  const lead=(first.getDay()+6)%7;
  const days=new Date(y,m+1,0).getDate();
  const grid=$("#calGrid");grid.innerHTML="";
  const todayStr=ymd(new Date());
  for(let i=0;i<lead;i++){const c=document.createElement("div");c.className="cell out";grid.appendChild(c);}
  for(let d=1;d<=days;d++){
    const date=new Date(y,m,d);const ds=ymd(date);const wd=(date.getDay()+6)%7;
    const ids=planForWeekday(wd);
    const c=document.createElement("div");
    c.className="cell"+(ds===todayStr?" today":"")+(ds===calSel?" sel":"")+(ids.length?"":" rest");
    const cats=[...new Set(ids.map(id=>{const e=exById(id);return e?e.catId:null;}).filter(Boolean))];
    let dots=cats.slice(0,4).map(cid=>`<span class="dot" style="background:${(catById(cid)||{}).color||'#bbb'}"></span>`).join("");
    c.innerHTML=`<span class="dnum">${d}</span><div class="dots">${dots}</div>`;
    c.onclick=()=>{calSel=ds;renderCalendar();showDay(ds,wd);};
    grid.appendChild(c);
  }
  showDay(calSel,(new Date(calSel).getDay()+6)%7);
}
function showDay(ds,wd){
  const dt=new Date(ds);
  $("#dayLabel").textContent=(dt.getMonth()+1)+"月"+dt.getDate()+"日 · "+WD[wd];
  renderTaskList($("#dayTasks"),planForWeekday(wd),ds,false);
}

/* ---------------- 计划：每个工作日对应的动作 ---------------- */
function planForWeekday(wd){
  if(!state.plan||!state.plan.days)return [];
  return state.plan.days[wd]||[];
}

/* ---------------- 计划设置界面 ---------------- */
function renderPlanScreen(){
  const p=state.prefs;
  $("#vDays").textContent=p.daysPerWeek;
  $("#vMin").textContent=p.dailyMin;$("#vMax").textContent=p.dailyMax;
  $("#ratio").value=p.cardioPct;$("#vCar").textContent=p.cardioPct;$("#vStr").textContent=100-p.cardioPct;
  $("#notes").value=p.notes||"";
  const dp=$("#dayPick");dp.innerHTML="";
  WD1.forEach((w,i)=>{
    const b=document.createElement("button");b.textContent=w;
    b.className=p.restDays.includes(i)?"rest":"";
    b.onclick=()=>{const r=p.restDays;const k=r.indexOf(i);if(k>=0)r.splice(k,1);else r.push(i);save();renderPlanScreen();};
    dp.appendChild(b);
  });
  if(state.plan)renderPlanResult();else $("#planResult").innerHTML="";
}
$$("[data-step]").forEach(b=>b.onclick=()=>{
  const p=state.prefs,k=b.dataset.step;
  if(k==="days+")p.daysPerWeek=Math.min(7,p.daysPerWeek+1);
  if(k==="days-")p.daysPerWeek=Math.max(1,p.daysPerWeek-1);
  if(k==="min+")p.dailyMin=Math.min(p.dailyMax,p.dailyMin+5);
  if(k==="min-")p.dailyMin=Math.max(10,p.dailyMin-5);
  if(k==="max+")p.dailyMax=Math.min(180,p.dailyMax+5);
  if(k==="max-")p.dailyMax=Math.max(p.dailyMin,p.dailyMax-5);
  save();renderPlanScreen();
});
$("#ratio").oninput=e=>{const v=+e.target.value;state.prefs.cardioPct=v;$("#vCar").textContent=v;$("#vStr").textContent=100-v;save();};
$("#notes").oninput=e=>{state.prefs.notes=e.target.value;save();};

/* ---------------- 排课算法 ---------------- */
$("#genPlan").onclick=()=>{
  if(!state.exercises.length){alert("动作库还是空的，先去添加动作。");return;}
  state.plan={days:generateDays(),createdAt:Date.now()};
  save();renderPlanResult();
  $("#planResult").scrollIntoView({behavior:"smooth",block:"nearest"});
};
function generateDays(){
  const p=state.prefs;
  const work=[0,1,2,3,4,5,6].filter(d=>!p.restDays.includes(d));
  const n=Math.min(p.daysPerWeek,work.length);
  const chosen=pickEvenly(work,n);
  const target=Math.round((p.dailyMin+p.dailyMax)/2);
  const cardioBudget=Math.round(target*p.cardioPct/100);
  const strengthBudget=target-cardioBudget;
  const cardio=state.exercises.filter(e=>e.type==="cardio");
  const strength=state.exercises.filter(e=>e.type==="strength");
  // 力量按部位交错，保证各部位轮到
  const byCat={};strength.forEach(e=>(byCat[e.catId]||(byCat[e.catId]=[])).push(e));
  const catIds=Object.keys(byCat);
  const interleaved=[];let added=true,r=0;
  while(added){added=false;catIds.forEach(c=>{if(byCat[c][r]){interleaved.push(byCat[c][r]);added=true;}});r++;}
  const days={};
  let ci=0,si=0;
  chosen.forEach(wd=>{
    const list=[];let cm=0,sm=0;
    let guard=0;
    while(cardio.length&&cm<cardioBudget&&guard<50){const e=cardio[ci%cardio.length];ci++;guard++;if(cm+e.minutes<=p.dailyMax){list.push(e.id);cm+=e.minutes;}else break;}
    guard=0;
    while(interleaved.length&&sm<strengthBudget&&guard<50){const e=interleaved[si%interleaved.length];si++;guard++;if(cm+sm+e.minutes<=p.dailyMax){list.push(e.id);sm+=e.minutes;}else break;}
    // 若某类没动作，用另一类补满到 target
    if(!cardio.length){guard=0;while(interleaved.length&&(sm)<target&&guard<50){const e=interleaved[si%interleaved.length];si++;guard++;if(sm+e.minutes<=p.dailyMax){list.push(e.id);sm+=e.minutes;}else break;}}
    if(!interleaved.length){guard=0;while(cardio.length&&cm<target&&guard<50){const e=cardio[ci%cardio.length];ci++;guard++;if(cm+e.minutes<=p.dailyMax){list.push(e.id);cm+=e.minutes;}else break;}}
    days[wd]=list;
  });
  return days;
}
function pickEvenly(arr,n){
  if(n>=arr.length)return arr.slice();
  const out=[];for(let i=0;i<n;i++)out.push(arr[Math.round(i*(arr.length-1)/(n-1))]);
  return [...new Set(out)];
}
function renderPlanResult(){
  const box=$("#planResult");
  const days=state.plan.days;
  let rows="";
  for(let wd=0;wd<7;wd++){
    const ids=days[wd]||[];
    const cats=[...new Set(ids.map(id=>{const e=exById(id);return e?e.catId:null;}).filter(Boolean))];
    const mins=ids.reduce((s,id)=>s+((exById(id)||{}).minutes||0),0);
    const tags=cats.map(c=>`<span class="chip" style="background:${(catById(c)||{}).color};font-size:10px;padding:2px 7px">${esc((catById(c)||{}).name)}</span>`).join("");
    rows+=`<div class="row"><span class="dn">${WD[wd]}</span><span class="dt">${ids.length?tags+`<span style="align-self:center">${mins}分</span>`:'<span style="color:var(--ink-2)">休息</span>'}</span></div>`;
  }
  box.innerHTML=`<div class="plan-summary">${rows}</div>
    <button class="btn ghost" onclick="go('today')">回到今天看看 →</button>`;
}

/* ---------------- 动作库 ---------------- */
function renderLib(){
  const box=$("#libBody");box.innerHTML="";
  if(!state.categories.length){
    box.innerHTML=`<div class="empty"><div class="ico">📦</div>
      <p>还没有训练部位。<br>添加你想练的部位（如臀腿、肩背、有氧），再往里加动作。</p>
      <div class="btn-row" style="max-width:300px;margin:0 auto">
      <button class="btn accent" onclick="openCat()">添加部位</button>
      <button class="btn ghost" onclick="seedDemo()">载入示例</button></div></div>`;
    return;
  }
  state.categories.forEach(cat=>{
    const exs=state.exercises.filter(e=>e.catId===cat.id);
    const blk=document.createElement("div");blk.className="cat-block";
    blk.innerHTML=`<div class="cat-title">
        <span class="swatch" style="background:${cat.color}"></span>
        <span class="n">${esc(cat.name)}</span>
        <span class="count">${exs.length} 个</span>
        <button class="add" title="添加动作">+</button>
      </div>`;
    blk.querySelector(".add").onclick=()=>openEx(cat.id);
    exs.forEach(e=>{
      const row=document.createElement("div");row.className="ex-row";
      const icon=e.kind==="video"?PLAT[e.platform].i:cardIcon(e.title);
      row.innerHTML=`<span class="ei">${icon}</span>
        <div class="et"><div class="t">${esc(e.title)}</div>
          <div class="s">${e.kind==="video"?PLAT[e.platform].n:"运动卡片"} · ${e.minutes}分
            <span class="tag-type ${e.type}">${e.type==="cardio"?"有氧":"力量"}</span></div></div>
        <button class="del" aria-label="删除">✕</button>`;
      row.querySelector(".del").onclick=()=>{
        state.exercises=state.exercises.filter(x=>x.id!==e.id);save();renderLib();
      };
      blk.appendChild(row);
    });
    if(!exs.length){const h=document.createElement("div");h.style.cssText="color:var(--ink-2);font-size:13px;padding:4px 2px 4px";h.textContent="点右上 + 添加动作";blk.appendChild(h);}
    box.appendChild(blk);
  });
}

/* ---------------- 弹窗：部位 ---------------- */
let catColor=PALETTE[0],catType="strength";
function buildSwatches(){
  const w=$("#catSwatches");w.innerHTML="";
  PALETTE.forEach(c=>{const b=document.createElement("button");b.style.background=c;
    b.className=c===catColor?"on":"";b.onclick=()=>{catColor=c;buildSwatches();};w.appendChild(b);});
}
function openCat(){
  catColor=PALETTE[state.categories.length%PALETTE.length];catType="strength";
  buildSwatches();
  $("#catName").value="";
  $$("#catType button").forEach(b=>b.classList.toggle("on",b.dataset.ct==="strength"));
  $("#catSheet").classList.add("show");
}
$("#addCatBtn").onclick=openCat;
$$("#catType button").forEach(b=>b.onclick=()=>{catType=b.dataset.ct;$$("#catType button").forEach(x=>x.classList.toggle("on",x===b));});
$("#saveCat").onclick=()=>{
  const name=$("#catName").value.trim();if(!name){$("#catName").focus();return;}
  state.categories.push({id:uid(),name,color:catColor,type:catType});
  save();closeSheets();renderLib();
};

/* ---------------- 弹窗：动作 ---------------- */
let exCatId=null,exKind="video",exType="strength",exMin=20;
function openEx(catId){
  exCatId=catId;exKind="video";exMin=20;
  const cat=catById(catId);exType=cat&&cat.type==="cardio"?"cardio":"strength";
  $("#exSheetTitle").textContent="为「"+(cat?cat.name:"")+"」添加动作";
  $("#exUrl").value="";$("#exTitle").value="";$("#exCardName").value="";
  $("#exMinVal").textContent=exMin;
  setKind("video");setExType(exType);
  $("#exSheet").classList.add("show");
}
function setKind(k){exKind=k;$$("#exKind button").forEach(b=>b.classList.toggle("on",b.dataset.ek===k));
  $("#videoFields").style.display=k==="video"?"":"none";$("#cardFields").style.display=k==="card"?"":"none";
  if(k==="card"){exType="cardio";setExType("cardio");}}
function setExType(t){exType=t;$$("#exType button").forEach(b=>b.classList.toggle("on",b.dataset.et===t));}
$$("#exKind button").forEach(b=>b.onclick=()=>setKind(b.dataset.ek));
$$("#exType button").forEach(b=>b.onclick=()=>setExType(b.dataset.et));
$$("[data-exmin]").forEach(b=>b.onclick=()=>{exMin=b.dataset.exmin==="+"?Math.min(120,exMin+5):Math.max(5,exMin-5);$("#exMinVal").textContent=exMin;});
$("#saveEx").onclick=()=>{
  let e={id:uid(),catId:exCatId,kind:exKind,type:exType,minutes:exMin};
  if(exKind==="video"){
    const url=$("#exUrl").value.trim();if(!url){$("#exUrl").focus();return;}
    e.url=url;e.platform=detectPlatform(url);
    e.title=$("#exTitle").value.trim()||PLAT[e.platform].n+"视频";
  }else{
    const name=$("#exCardName").value.trim();if(!name){$("#exCardName").focus();return;}
    e.title=name;e.platform="card";
  }
  state.exercises.push(e);save();closeSheets();renderLib();
};

$$("[data-close]").forEach(b=>b.onclick=closeSheets);
